<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — Allowed Emails</title>
  <link rel="stylesheet" href="./styles.css">
  <style>
    .email-list{ list-style:none; padding:0; margin:12px 0 0; display:flex; flex-direction:column; gap:8px; }
    .email-item{
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      padding:10px 14px;
      border:1px solid var(--border);
      border-radius:12px;
      background: rgba(255,255,255,.03);
      font-size:14px;
    }
    .add-form{ display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap; margin-top:14px; }
    .add-form input[type="email"]{
      height:40px; padding:0 12px; min-width:260px;
      border-radius:12px;
      border:1px solid var(--border);
      background: rgba(16,26,51,.6);
      color: var(--text);
      font-size:14px;
    }
    .error-msg{ color: var(--danger); margin-top:12px; font-size:14px; }
    .item-controls{ display:flex; align-items:center; gap:12px; }
    .toggle-wrap{ display:flex; align-items:center; gap:6px; font-size:13px; color:#8899aa; }
    .toggle{ position:relative; display:inline-block; width:40px; height:22px; flex-shrink:0; }
    .toggle input{ opacity:0; width:0; height:0; position:absolute; }
    .toggle-slider{
      position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0;
      background:rgba(255,255,255,.15); border-radius:22px; transition:background .2s;
    }
    .toggle-slider:before{
      position:absolute; content:""; height:16px; width:16px;
      left:3px; bottom:3px; background:white; border-radius:50%; transition:transform .2s;
    }
    .toggle input:checked + .toggle-slider{ background:#22c55e; }
    .toggle input:checked + .toggle-slider:before{ transform:translateX(18px); }
    .toggle input:disabled + .toggle-slider{ opacity:.5; cursor:default; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="header-row">
        <div class="brand">
          <h1>Admin — Allowed Emails</h1>
          <p><a href="./index.html">Back to Grades</a></p>
        </div>
        <div class="actions">
          <span id="userPill" class="pill hidden"></span>
          <button id="signInBtn" class="btn primary" type="button">
            <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
              <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.2 6.1 29.4 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.2-.4-3.5z"/>
              <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.2 6.1 29.4 4 24 4c-7.7 0-14.4 4.3-17.7 10.7z"/>
              <path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.6-5.2l-6.3-5.2C29.2 35.2 26.7 36 24 36c-5.3 0-9.8-3.4-11.3-8.1l-6.5 5C9.5 39.5 16.2 44 24 44z"/>
              <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1.2 3.1-3.7 5.6-7 6.6l6.3 5.2C36.8 38 44 34 44 24c0-1.3-.1-2.2-.4-3.5z"/>
            </svg>
            Sign in with Google
          </button>
          <button id="signOutBtn" class="btn danger hidden" type="button">Sign out</button>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <section id="authShell" class="auth-panel">
      <div class="card">
        <h2 style="margin:0 0 8px; font-size:16px;">Sign in to manage allowed emails</h2>
        <p class="muted-block" style="margin:0;">Only the admin account can access this page.</p>
      </div>
    </section>

    <div id="adminShell" class="hidden">
      <div class="card" style="margin-top:18px;">
        <h3>Allowed emails</h3>
        <div id="emailError" class="error-msg hidden"></div>
        <ul id="emailList" class="email-list"></ul>
        <div class="add-form">
          <div>
            <label for="newEmail">Add email</label>
            <input id="newEmail" type="email" placeholder="user@example.com" />
          </div>
          <button id="addEmailBtn" class="btn primary" type="button">Add</button>
        </div>
      </div>
    </div>
  </main>

  <div id="toast" class="hidden" role="status" aria-live="polite"></div>

  <script type="module" src="./admin.js"></script>
</body>
</html>
