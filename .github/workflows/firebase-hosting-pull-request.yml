# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        id: deploy
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NIGELSMITH_PF }}
          projectId: nigelsmith-pf
      - uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: "Firebase Hosting Preview"
          description: |
            **PR:** ${{ github.event.pull_request.title }}
            **Branch:** `${{ github.head_ref }}` → `${{ github.base_ref }}`
            **Triggered by:** ${{ github.actor }}
            **Preview URL:** ${{ steps.deploy.outputs.details_url }}
          url: ${{ github.event.pull_request.html_url }}
          username: GitHub Actions
